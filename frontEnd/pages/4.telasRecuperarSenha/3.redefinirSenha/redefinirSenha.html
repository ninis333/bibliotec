<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../../img/Group.png">
    <title>Recuperar senha</title>
    <link rel="stylesheet" href="redefinirSenha.css">
</head>

<body>

    <script class="backgroundCor" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.5/dist/dotlottie-wc.js" type="module"></script>
    <dotlottie-wc class="backgroundCor" src="https://lottie.host/6fa2fd5a-7ac5-4557-be88-336870318aa9/nloOgwKlrT.lottie" autoplay loop></dotlottie-wc>

    <img class="imagemLogo" src="../../../img/logo.png" alt="Logo">

    <main class="divinha">
        <div class="retangulo">

            <h1 class="redefinirSenhah1">Redefinir senha</h1>

            <form class="redefinirSenha" id="redefinirSenha">

                <h3>Senha</h3>
                <input class="imput" type="password" id="senha" autocomplete="new-password">

                <h3>Confirmar senha</h3>
                <input class="imput" type="password" id="confirmarSenha" autocomplete="new-password">

                <div class="confirmar">
                    <button class="btnRedefinirSenha" type="submit" id="btnRedefinirSenha">
                        Enviar
                    </button>
                </div>

            </form>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="redefinirSenha.js"></script>
</body>

</html>
